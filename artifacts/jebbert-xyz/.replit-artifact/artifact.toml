kind = "web"
previewPath = "/"
title = "jebbert.xyz"
version = "1.0.0"
id = "artifacts/jebbert-xyz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22143

[services.development]
run = "pnpm --filter @workspace/jebbert-xyz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jebbert-xyz", "run", "build" ]
publicDir = "artifacts/jebbert-xyz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22143"
BASE_PATH = "/"
