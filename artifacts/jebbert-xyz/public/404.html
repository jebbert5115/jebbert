<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>jebbert.xyz</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // Encodes the full path into the query string, then redirects to index.html.
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var redirect = '/?p=' + encodeURIComponent(path + search + hash);
      window.location.replace(redirect);
    </script>
  </head>
  <body></body>
</html>
